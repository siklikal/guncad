name: Sync Meilisearch

on:
  schedule:
    # 8 AM and 8 PM UTC
    - cron: '0 8,20 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Full sync and push
        env:
          MEILISEARCH_URL: ${{ secrets.MEILISEARCH_URL }}
          MEILISEARCH_MASTER_KEY: ${{ secrets.MEILISEARCH_MASTER_KEY }}
        run: node scripts/sync-meilisearch.js --push
